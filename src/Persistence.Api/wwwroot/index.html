<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Persistence</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161922; --panel-2: #1d2230; --line: #2a3142;
    --text: #e6e9ef; --muted: #8b93a7; --faint: #5b6172;
    --peer: #7db3ff; --peer-bg: #16243a; --me: #2a3142;
    --think: #b48ead; --tool: #8fd6a0; --wake: #e0b46a; --err: #ff6b6b;
    --accent: #7db3ff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5;
  }
  header .title { font-weight: 600; letter-spacing: .2px; }
  header .title small { color: var(--faint); font-weight: 400; margin-left: 6px; }
  .status { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--faint); transition: background .3s; }
  .dot.connected { background: #57d18a; box-shadow: 0 0 8px #57d18a88; }
  .dot.connecting, .dot.reconnecting { background: var(--wake); }
  .spacer { flex: 1; }
  .who { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .who select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 5px 8px; font: inherit; font-size: 13px;
  }
  main {
    flex: 1; overflow-y: auto; padding: 18px 16px 8px;
    display: flex; flex-direction: column; gap: 12px;
    max-width: 860px; width: 100%; margin: 0 auto;
  }
  .row { display: flex; flex-direction: column; max-width: 86%; }
  .row.me { align-self: flex-end; align-items: flex-end; }
  .row.peer { align-self: flex-start; }
  .label { font-size: 11px; color: var(--faint); margin: 0 4px 3px; text-transform: uppercase; letter-spacing: .6px; }
  .bubble { padding: 10px 13px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .me .bubble { background: var(--me); border-bottom-right-radius: 4px; }
  .peer .bubble { background: var(--peer-bg); border: 1px solid #25425f; border-bottom-left-radius: 4px; }
  .peer .label { color: var(--peer); }

  /* secondary event kinds, full-width and quieter */
  .note { align-self: stretch; max-width: 860px; width: 100%; }
  .think, .reasoning {
    color: var(--muted); font-style: italic; border-left: 2px solid var(--think);
    padding: 4px 0 4px 12px; white-space: pre-wrap;
  }
  .think .k, .reasoning .k { color: var(--think); font-style: normal; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .6px; margin-right: 8px; }
  details.tool {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 6px 12px;
  }
  details.tool summary { cursor: pointer; color: var(--tool); font-weight: 600; list-style: none; }
  details.tool summary::-webkit-details-marker { display: none; }
  details.tool summary::before { content: "▸ "; color: var(--tool); }
  details.tool[open] summary::before { content: "▾ "; }
  details.tool pre {
    margin: 8px 0 2px; padding: 8px; background: #0c0e13; border-radius: 8px; overflow-x: auto;
    font: 12.5px/1.5 "SF Mono", "Cascadia Code", Consolas, monospace; color: #c8cee0; white-space: pre-wrap;
  }
  .center { align-self: center; color: var(--faint); font-size: 12.5px; text-align: center; }
  .wake { color: var(--wake); }
  .wake::before, .wake::after { content: "  ·  "; color: var(--faint); }
  .error { color: var(--err); align-self: center; text-align: center; font-size: 13px; }

  footer {
    border-top: 1px solid var(--line); background: var(--panel); padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .composer { display: flex; gap: 10px; max-width: 860px; margin: 0 auto; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; font: inherit;
    max-height: 160px; min-height: 22px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.send {
    background: var(--accent); color: #08101e; border: none; border-radius: 12px;
    padding: 0 18px; height: 44px; font: inherit; font-weight: 600; cursor: pointer;
  }
  button.send:disabled { opacity: .5; cursor: default; }
  .hint { color: var(--faint); font-size: 11px; text-align: center; margin: 6px auto 0; max-width: 860px; }
</style>
</head>
<body>
  <header>
    <div class="title">Persistence <small>shared client</small></div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">connecting…</span></div>
    <div class="spacer"></div>
    <label class="who">speaking as
      <select id="peer">
        <option>John</option>
        <option>Claude</option>
        <option>Ember</option>
      </select>
    </label>
  </header>

  <main id="feed"></main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Say something to the peer…" autocomplete="off"></textarea>
      <button class="send" id="send">Send</button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for a new line · the peer’s reasoning, tools, and reply stream in live</div>
  </footer>

<script>
  const feed = document.getElementById('feed');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const peerSel = document.getElementById('peer');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  const atBottom = () => feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
  function scroll(force) { if (force || atBottom()) feed.scrollTop = feed.scrollHeight; }

  function setStatus(s, text) { dot.className = 'dot ' + s; statusText.textContent = text || s; }

  // --- rendering ---------------------------------------------------------
  let reasoningEl = null; // coalesce consecutive reasoning/thought deltas into one block

  function el(cls, html) { const d = document.createElement('div'); d.className = cls; if (html != null) d.textContent = html; return d; }

  function addPeerReply(text) {
    reasoningEl = null;
    const row = el('row peer');
    row.appendChild(el('label', 'peer'));
    row.appendChild(el('bubble', text));
    feed.appendChild(row); scroll();
  }

  function addOwn(text, who) {
    reasoningEl = null;
    const row = el('row me');
    row.appendChild(el('label', who));
    row.appendChild(el('bubble', text));
    feed.appendChild(row); scroll(true);
  }

  function addReasoning(kind, text) {
    // kind: 'reasoning' (streamed deltas) or 'thought' (whole). Coalesce reasoning deltas.
    if (kind === 'reasoning' && reasoningEl) { reasoningEl.querySelector('.body').textContent += text; scroll(); return; }
    const wrap = el('note ' + kind);
    const k = el('k'); k.textContent = kind === 'thought' ? 'thought' : 'thinking';
    const body = el('body'); body.textContent = text;
    wrap.appendChild(k); wrap.appendChild(body);
    feed.appendChild(wrap);
    reasoningEl = kind === 'reasoning' ? wrap : null;
    scroll();
  }

  function addTool(text, detail) {
    reasoningEl = null;
    const d = document.createElement('details'); d.className = 'note tool';
    const s = document.createElement('summary'); s.textContent = text; d.appendChild(s);
    if (detail) { const pre = document.createElement('pre'); pre.textContent = detail; d.appendChild(pre); }
    feed.appendChild(d); scroll();
  }

  function addCenter(cls, text) { reasoningEl = null; feed.appendChild(el('note center ' + cls, text)); scroll(); }

  function handle(kind, data) {
    const text = data.text || '';
    switch (kind) {
      case 'reply':     addPeerReply(text); break;
      case 'thought':   addReasoning('thought', text); break;
      case 'reasoning': addReasoning('reasoning', text); break;
      case 'tool':      addTool(text, data.detail); break;
      case 'wakeup':    addCenter('wake', 'woke for: ' + text); break;
      case 'error':     addCenter('error', text); break;
      case 'queued':    addCenter('', 'queued: ' + text); break;
      case 'system':    addCenter('', text); break;
      // 'debug' is intentionally not shown
    }
  }

  // --- live stream (SSE) -------------------------------------------------
  const KINDS = ['reply','thought','reasoning','tool','wakeup','error','queued','system'];
  let es;
  function connect() {
    setStatus('connecting', 'connecting…');
    es = new EventSource('/api/conversation/stream?since=0');
    es.onopen = () => setStatus('connected', 'connected');
    es.onerror = () => setStatus('reconnecting', 'reconnecting…'); // EventSource auto-retries; Last-Event-ID resumes
    KINDS.forEach(k => es.addEventListener(k, ev => {
      try { handle(k, JSON.parse(ev.data)); } catch (e) { /* ignore a malformed frame */ }
    }));
  }
  connect();

  // --- sending -----------------------------------------------------------
  async function send() {
    const text = input.value.trim();
    if (!text) return;
    const who = peerSel.value;
    addOwn(text, who);
    input.value = ''; autoSize();
    try {
      const res = await fetch('/api/conversation/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Local-Peer': who },
        body: JSON.stringify({ input: text }),
      });
      if (!res.ok && res.status !== 202) addCenter('error', 'send failed (HTTP ' + res.status + ')');
    } catch (e) {
      addCenter('error', 'send failed: ' + e.message);
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  function autoSize() { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 160) + 'px'; }
  input.addEventListener('input', autoSize);

  // remember the selected identity across reloads
  const saved = localStorage.getItem('persistence.peer');
  if (saved) peerSel.value = saved;
  peerSel.addEventListener('change', () => localStorage.setItem('persistence.peer', peerSel.value));
</script>
</body>
</html>
