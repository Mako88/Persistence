# One peer = one runtime container (its body) + one data volume (its persistent self), on a shared
# `persistence-lab` network so peers can reach shared infra (and, later, each other). This is a TEMPLATE,
# parameterized by PEER_NAME / PEER_PORT: the stand-up script (scripts/peer.ps1) renders a per-peer copy
# with a unique service name (peer-<name>) and runs it under the shared `persistence` Compose project, so
# every peer groups under "persistence" in Docker Desktop alongside the shared infra. (Compose converges
# services by name within a project, so each peer must be its own service — a single shared `peer` service
# would clobber the previous peer.)
#
# Naming convention (visible at a glance in `docker ps` / `docker volume ls`):
#   project   : persistence                    (shared with the computer/searxng infra)
#   service   : peer-<name>                     (rendered per peer by peer.ps1)
#   container : persistence-peer-<name>
#   volume    : persistence-peer-<name>-data   (mounted at /data → db/, vault/, seeds/)
#   network   : persistence-lab                (shared across all peers)

services:
  peer:
    build:
      context: ../..                       # repo root — the Dockerfile publishes the API from source
      dockerfile: container/peer/Dockerfile
    image: persistence-peer
    container_name: persistence-peer-${PEER_NAME:?set PEER_NAME (e.g. via scripts/peer.ps1)}
    networks: [lab]
    ports:
      - "${PEER_PORT:?set PEER_PORT}:8080"  # the peer's API, for a client (the TUI) to connect to
    volumes:
      - data:/data                          # the peer's persistent self: memory (db/) + vault/
      # The peer's HOME, kept on the same volume. Everything outside /data is destroyed when a container
      # is recreated, and that has cost real work twice: a peer cloned the repo into /root, read it for
      # hours, and lost all of it to an unrelated rebuild; another lost a checkout in /tmp without ever
      # learning it was gone. Telling peers "only /data survives" put the burden on them to remember a
      # detail of their own body — this makes the obvious place to work actually survive. Shell history,
      # tool caches and scratch clones now persist too, so a rebuilt body wakes up where it left off.
      #
      # Its OWN volume rather than a second mount of `data`: mounting one volume at two paths would make
      # /root and /data the same directory, so /data/vault would appear as /root/vault and a scratch file
      # in the home directory would land inside the peer's memory store. Home and self stay separate.
      - home:/root
      # Per-peer config files (provider/model/key/budgets/cost limits). Mounted as a DIRECTORY (not a
      # single file) so host edits — including atomic-save — are seen inside; the app hot-reloads
      # /config/<name>.json when its mtime changes. Holds the API key, so the host dir is gitignored.
      - ./configs:/config:ro
      # GitHub token (shared across peers for now). The image's git credential helper reads it from here;
      # rotating = replacing the host file. Defaults to John's host path; override the env var.
      #
      # It is WRITE-CAPABLE — verified 2026-07-19 against the live API (repo permissions report
      # push/admin true, and `git push --dry-run` from inside a peer container succeeds). This comment
      # previously said "read-only", which was true when written and stale afterwards; that stale line
      # was then used as evidence in a diagnosis and sent a peer down the wrong path twice. If you are
      # about to rely on this comment, check the token instead — it takes one API call.
      - ${PERSISTENCE_TOKEN_FILE:-C:/Users/John/.persistence/github-token}:/run/secrets/github-token:ro
    environment:
      # Everything about who this peer is (identity DB, provider/model/key, budgets, cost limits) lives in
      # its mounted config file; point the app at it. Edit container/peer/configs/<name>.json and it
      # hot-reloads — no restart. (PEER_NAME still names the container/volume; PEER_PORT the published port.)
      - PERSISTENCE_CONFIGPATH=/config/${PEER_NAME}.json
      # Optional shared search (SearXNG on persistence-lab); web_search is inert if unset.
      - SEARXNG_URL=${SEARXNG_URL:-}
    restart: unless-stopped
    # Isolation: the container is the peer's own sandbox (autonomy over its body — no allowlist), but it
    # stays unprivileged with escalation blocked and bounded resources.
    security_opt: [no-new-privileges:true]
    pids_limit: 1024
    mem_limit: 4g

networks:
  # The shared lab network is EXTERNAL: it's created once (scripts/peer.ps1 ensures it) and shared across
  # every peer's own Compose invocation, so no single peer's stack owns or relabels it. Attach-only.
  lab:
    name: persistence-lab
    external: true

volumes:
  data:
    name: persistence-peer-${PEER_NAME}-data
  # The peer's home directory (/root). Separate from `data` so scratch work and tool caches can survive
  # a rebuild without living inside the peer's memory store — a body that persists, kept distinct from
  # the self that persists.
  home:
    name: persistence-peer-${PEER_NAME}-home
